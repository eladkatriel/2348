services:
  - type: web
    name: monday-dropbox-mvp1
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    packages:
      - libnss3
      - libnspr4
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxfixes3
      - libxrandr2
      - libgbm1
      - libasound2
      - libpango-1.0-0
      - libcairo2
